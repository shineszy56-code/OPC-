<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device=device, initial-scale=1.0">
    <title>AI OPC - 项目协作</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/yjs@13.6.7/dist/y.cjs.min.cjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/yjs@13.6.7/dist/ydoc.cjs.min.cjs"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .online-dot { width: 8px; height: 8px; border-radius: 50%; background: #4CAF50; display: inline-block; }
        .status-todo { color: #9E9E9E; }
        .status-in-progress { color: #2196F3; }
        .status-done { color: #4CAF50; }
        .status-blocked { color: #F44336; }
        .priority-low { color: #4CAF50; }
        .priority-medium { color: #FFC107; }
        .priority-high { color: #F44336; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <!-- 加载中 -->
    <div id="loading" class="flex items-center justify-center min-h-screen">
        <div class="text-center">
            <div class="text-4xl mb-4">🔗</div>
            <div class="text-lg">正在加载协作数据...</div>
            <div id="loading-error" class="text-red-400 mt-4 hidden"></div>
        </div>
    </div>

    <!-- 主内容 -->
    <div id="main" class="hidden">
        <!-- 顶部导航 -->
        <nav class="bg-gray-800 p-4 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <span id="project-icon" class="text-2xl"></span>
                <h1 id="project-name" class="text-xl font-bold"></h1>
            </div>
            <div class="text-sm text-gray-400" id="online-count"></div>
        </nav>

        <!-- 进度条 -->
        <div class="bg-gray-800 px-4 py-3">
            <div class="flex items-center justify-between mb-2">
                <span class="text-sm font-medium">项目进度</span>
                <span id="progress-text" class="text-lg font-bold text-purple-400"></span>
            </div>
            <div class="w-full bg-gray-700 rounded-full h-2">
                <div id="progress-bar" class="bg-purple-500 h-2 rounded-full" style="width: 0%"></div>
            </div>
        </div>

        <!-- 成员列表 -->
        <div class="bg-gray-800 mx-4 mt-4 p-3 rounded-lg">
            <h2 class="text-sm font-medium text-gray-400 mb-2">在线成员</h2>
            <div id="member-list" class="flex space-x-2">
                <!-- 成员头像将通过 JS 插入 -->
            </div>
        </div>

        <!-- 任务列表 -->
        <div class="p-4">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-semibold">任务列表</h2>
                <button id="add-task-btn" class="bg-purple-600 hover:bg-purple-700 px-4 py-2 rounded-lg text-sm font-medium hidden">
                    + 添加任务
                </button>
            </div>
            <div id="task-list" class="space-y-3">
                <!-- 任务卡片将通过 JS 插入 -->
            </div>
        </div>

        <!-- 操作日志 -->
        <div class="bg-gray-800 mx-4 mt-4 p-4 rounded-lg">
            <h2 class="text-lg font-semibold mb-4">操作日志</h2>
            <div id="log-timeline" class="space-y-4">
                <!-- 日志将通过 JS 插入 -->
            </div>
        </div>

        <!-- 过期提示 -->
        <div id="expiry-warning" class="bg-red-900 border border-red-700 text-red-200 p-4 m-4 rounded-lg hidden">
            ⚠️ 此分享链接已过期
        </div>
    </div>

    <!-- 脚本 -->
    <script src="js/crypto.js"></script>
    <script src="js/yjs-sync.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
