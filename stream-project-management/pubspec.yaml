name: stream_project_management
description: "AI OPC 一人公司项目管理 App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # ==================== 状态管理 ====================
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0

  # ==================== 本地数据库 ====================
  sqflite_sqlcipher: ^3.1.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # ==================== 不可变数据模型 ====================
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0
  uuid: ^4.2.0

  # ==================== 加密 ====================
  pointycastle: ^3.9.0
  crypto: ^3.0.0
  encrypt: ^5.0.0
  flutter_secure_storage: ^9.0.0

  # ==================== 网络请求 ====================
  dio: ^5.4.0
  connectivity_plus: ^6.0.0

  # ==================== AI ====================
  langchain: ^0.3.1+1
  langchain_openai: ^0.7.0
  ollama_dart: ^0.2.0

  # ==================== CRDT + P2P ====================
  # flutter_webrtc 和 webrtc_interface 待 P2P 功能实现时启用

  # ==================== 日期处理 ====================
  intl: ^0.19.0
  timeago: ^3.6.0

  # ==================== 通知 ====================
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.0

  # ==================== 生物识别 ====================
  local_auth: ^2.1.0

  # ==================== 文件处理 ====================
  file_picker: ^8.0.0
  open_file: ^3.3.0
  share_plus: ^10.0.0

  # ==================== UI ====================
  flex_color_scheme: ^8.1.0
  qr_flutter: ^4.1.0
  url_launcher: ^6.2.0

  # ==================== 工具 ====================
  logger: ^2.0.0
  rxdart: ^0.27.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # ==================== 代码生成 ====================
  build_runner: ^2.4.0
  freezed: ^2.4.0
  json_serializable: ^6.7.0
  riverpod_generator: ^2.3.0
  custom_lint: ^0.5.0
  riverpod_lint: ^2.3.0

  # ==================== 测试 Mock ====================
  mockito: ^5.4.0

  # ==================== Lint ====================
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
